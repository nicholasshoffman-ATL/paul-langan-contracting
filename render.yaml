services:
  - type: web
    name: paul-langan-contracting
    runtime: static
    # This is a plain static HTML/CSS/JS site — no build step required.
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      # JS/CSS have stable, unversioned filenames — must revalidate so code
      # updates reach returning visitors instead of being cached forever.
      - path: /assets/js/*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/css/*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      # Images, video, and fonts can be cached long — swap the filename to update.
      - path: /assets/img/*
        name: Cache-Control
        value: public, max-age=604800
      - path: /assets/video/*
        name: Cache-Control
        value: public, max-age=604800
    routes:
      # Pretty URLs -> .html files
      - type: rewrite
        source: /about
        destination: /about.html
      - type: rewrite
        source: /services
        destination: /services.html
      - type: rewrite
        source: /projects
        destination: /projects.html
      - type: rewrite
        source: /reviews
        destination: /reviews.html
      - type: rewrite
        source: /contact
        destination: /contact.html
