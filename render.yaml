services:
  - type: web
    name: paul-langan-contracting
    runtime: static
    # This is a plain static HTML/CSS/JS site — no build step required.
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # Pretty URLs -> .html files
      - type: rewrite
        source: /about
        destination: /about.html
      - type: rewrite
        source: /services
        destination: /services.html
      - type: rewrite
        source: /projects
        destination: /projects.html
      - type: rewrite
        source: /reviews
        destination: /reviews.html
      - type: rewrite
        source: /contact
        destination: /contact.html
